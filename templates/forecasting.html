{% extends "base.html" %}

{% block content %}

<div class="content-card">

    <h2>Demand Forecasting</h2>

    <table class="table">

        <thead>

            <tr>
                <th>Part Number</th>
                <th>Part Name</th>
                <th>Current Demand</th>
                <th>Forecast Demand</th>
            </tr>

        </thead>

        <tbody>

        {% for item in forecast_data %}

            <tr>

                <td>{{ item.part_number }}</td>
                <td>{{ item.part_name }}</td>
                <td>{{ item.current_demand }}</td>
                <td>{{ item.forecast }}</td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
